name: Update football data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Fetch latest standings
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          FOOTBALL_DATA_ENDPOINT: ${{ vars.FOOTBALL_DATA_ENDPOINT }}
        run: node scripts/update-standings.mjs

      - name: Fetch latest matches
        continue-on-error: true
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          FOOTBALL_DATA_MATCHES_ENDPOINT: ${{ vars.FOOTBALL_DATA_MATCHES_ENDPOINT }}
        run: node scripts/update-matches.mjs

      - name: Commit football data
        run: |
          if git diff --quiet -- data/standings.json data/matches.json; then
            echo "No football data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/standings.json data/matches.json
          git commit -m "Update football data"
          git push
