<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2026 世界杯赛况中心</title>
    <link rel="preconnect" href="https://flagcdn.com" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">FIFA World Cup 2026</p>
        <h1>世界杯赛况中心 <span class="inline-date">2026-06-22</span></h1>
      </div>
    </header>

    <main>
      <section class="section-head matches-title">
        <div>
          <p class="eyebrow">Tomorrow Matches</p>
          <h2>明日对阵与数据</h2>
        </div>
        <div id="daySwitch" class="day-switch" role="tablist" aria-label="赛程日期切换"></div>
      </section>
      <section class="match-board">
        <div id="matchTabs" class="match-tabs" role="tablist" aria-label="今日比赛"></div>
        <div id="matchPanel" class="match-panel"></div>
      </section>

      <section class="section-head">
        <div>
          <p class="eyebrow">Groups & Standings</p>
          <h2>小组分组与积分</h2>
          <p id="standingsMeta" class="section-meta">实时积分待接入</p>
        </div>
        <div class="legend">
          <span><i class="rank auto"></i>晋级区</span>
          <span><i class="rank third"></i>第三名竞争</span>
        </div>
      </section>
      <section id="groups" class="groups-grid" aria-label="小组积分"></section>

      <section class="my-take" aria-labelledby="takeTitle">
        <div class="take-head">
          <div>
            <p class="eyebrow">Match Notes</p>
            <h2 id="takeTitle">比赛观点</h2>
          </div>
        </div>
        <div id="takeDisplay" class="take-display">暂无观点。</div>
      </section>
    </main>

    <div id="teamOverlay" class="overlay" aria-hidden="true">
      <article class="team-page" role="dialog" aria-modal="true" aria-labelledby="teamName">
        <button id="closeTeam" class="icon-button close-button" type="button" aria-label="关闭球队详情">×</button>
        <div id="teamDetail"></div>
      </article>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
